<table
  dir="ltr"
  border="1"
  data-sheets-root="1"
  data-sheets-baot="1"
  style="
    box-sizing: border-box;
    font-family: Arial;
    border-collapse: collapse;
    border: none;
    empty-cells: show;
    max-width: 100%;
    color: rgb(65, 65, 65);
    font-style: normal;
    font-variant-ligatures: normal;
    font-variant-caps: normal;
    font-weight: 400;
    letter-spacing: normal;
    orphans: 2;
    text-align: left;
    text-transform: none;
    widows: 2;
    word-spacing: 0px;
    -webkit-text-stroke-width: 0px;
    white-space: normal;
    background-color: rgb(255, 255, 255);
    text-decoration-thickness: initial;
    text-decoration-style: initial;
    text-decoration-color: initial;
    table-layout: fixed;
    font-size: 10pt;
    width: 806px;
  "
>
  <tbody style="box-sizing: border-box; font-family: Averta, sans-serif">
    <tr
      style="
        box-sizing: border-box;
        font-family: Averta, sans-serif;
        height: 78px;
      "
    >
      <td
        style="
          box-sizing: border-box;
          font-family: Averta, sans-serif;
          user-select: text;
          min-width: 5px;
          border-width: 1px;
          border-style: solid;
          border-color: rgb(255, 255, 255) rgb(217, 217, 217) rgb(255, 255, 255)
            rgb(255, 255, 255);
          border-image: initial;
          width: 120px;
          height: 78px;
          overflow: hidden;
          vertical-align: bottom;
        "
      >
        <img
          src="https://i.imgur.com/1GnOA71.jpeg"
          style="
            box-sizing: border-box;
            font-family: Averta, sans-serif;
            border-style: none;
            vertical-align: top;
            cursor: pointer;
            padding: 0px 1px;
            user-select: none;
            position: relative;
            max-width: 100%;
            border-radius: 10px;
            background-clip: padding-box;
            margin: 5px auto;
            display: block;
            float: none;
            width: 100px;
          "
        />
      </td>
      <td
        style="
          box-sizing: border-box;
          font-family: Averta, sans-serif;
          user-select: text;
          min-width: 5px;
          border-width: 1px;
          border-style: solid;
          border-color: rgb(255, 255, 255) rgb(255, 255, 255) rgb(255, 255, 255)
            rgb(221, 221, 221);
          border-image: initial;
          overflow: hidden;
          padding: 2px 3px;
          vertical-align: middle;
        "
      >
        &nbsp;Mia Malcic
        <br
          style="box-sizing: border-box; font-family: Averta, sans-serif"
        />&nbsp;Co-founder @ Mindaptive
        <br
          style="box-sizing: border-box; font-family: Averta, sans-serif"
        />&nbsp;<a href="https://www.mindaptive.ai/" rel="noopener noreferrer"
          >Homepage</a
        >
        |
        <a
          href="https://calendar.app.google/egagEP2ue1yrVYXs7"
          rel="noopener noreferrer"
          >Book a call</a
        >
        <br
          style="box-sizing: border-box; font-family: Averta, sans-serif"
        /><img
          src="https://i.imgur.com/xb6y5MM.png"
          style="
            box-sizing: border-box;
            font-family: Averta, sans-serif;
            border-style: none;
            vertical-align: top;
            cursor: pointer;
            padding: 0px 1px;
            user-select: none;
            position: relative;
            max-width: 100%;
            margin: 5px auto 5px 0px;
            display: block;
            float: none;
            text-align: left;
            width: 128px;
          "
        />
      </td>
    </tr>
  </tbody>
</table>
