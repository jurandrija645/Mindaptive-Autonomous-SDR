{% extends "base.html" %}
{% block body %}
<div class="login-box">
  <h2>Mindaptive Responder</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button class="btn-send" type="submit" style="width:100%">Log in</button>
  </form>
</div>
{% endblock %}
